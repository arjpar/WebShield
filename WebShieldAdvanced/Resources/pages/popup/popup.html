<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebShield</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-width: 280px;
            max-width: 320px;
            background: #1a1a2e;
            color: #eaeaea;
        }

        .popup-container {
            padding: 16px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #2d2d44;
        }

        .header-icon {
            width: 32px;
            height: 32px;
        }

        .header-title {
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
        }

        .stats-card {
            background: linear-gradient(135deg, #2d2d44 0%, #1f1f35 100%);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .stats-main {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .stats-label {
            font-size: 13px;
            color: #a0a0b0;
        }

        .stats-count {
            font-size: 32px;
            font-weight: 700;
            color: #4a90d9;
        }

        .stats-count.zero {
            color: #666680;
        }

        .stats-breakdown {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            padding-top: 12px;
            border-top: 1px solid #3d3d54;
        }

        .stat-item {
            text-align: center;
        }

        .stat-item-count {
            font-size: 16px;
            font-weight: 600;
            color: #eaeaea;
        }

        .stat-item-label {
            font-size: 10px;
            color: #808090;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            background: #2d2d44;
            border-radius: 8px;
            font-size: 12px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4ade80;
            animation: pulse 2s infinite;
        }

        .status-dot.inactive {
            background: #666680;
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .status-text {
            color: #a0a0b0;
        }

        .domain {
            margin-top: 12px;
            padding: 8px 12px;
            background: #2d2d44;
            border-radius: 8px;
            font-size: 11px;
            color: #808090;
            word-break: break-all;
            text-align: center;
        }

        .whitelist-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 12px;
            padding: 12px;
            background: #2d2d44;
            border-radius: 8px;
        }

        .whitelist-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .whitelist-icon {
            font-size: 16px;
        }

        .whitelist-text {
            font-size: 13px;
            color: #a0a0b0;
        }

        .toggle-switch {
            position: relative;
            width: 44px;
            height: 24px;
            display: inline-block;
            flex-shrink: 0;
        }

        .toggle-switch input {
            opacity: 0;
            width: 100%;
            height: 100%;
            margin: 0;
            position: absolute;
            inset: 0;
            cursor: pointer;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #3d3d54;
            transition: 0.3s;
            border-radius: 24px;
            pointer-events: none;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: #eaeaea;
            transition: 0.3s;
            border-radius: 50%;
        }

        .toggle-switch input:checked + .toggle-slider {
            background-color: #4ade80;
        }

        .toggle-switch input:checked + .toggle-slider:before {
            transform: translateX(20px);
        }

        .toggle-switch input:disabled + .toggle-slider {
            cursor: not-allowed;
            opacity: 0.5;
        }

        .toggle-switch input:disabled {
            cursor: not-allowed;
        }

        .trusted-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-top: 8px;
            padding: 4px 8px;
            background: rgba(74, 222, 128, 0.15);
            border-radius: 4px;
            font-size: 11px;
            color: #4ade80;
        }

        .trusted-badge.hidden {
            display: none;
        }

        .zapper-card {
            margin-top: 12px;
            padding: 12px;
            background: #2d2d44;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .zapper-button {
            width: 100%;
            background: #4a90d9;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            padding: 10px 12px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        .zapper-button:disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }

        .zapper-hint {
            font-size: 11px;
            color: #a0a0b0;
            text-align: center;
        }

        .zapper-rules-section {
            margin-top: 8px;
            border-top: 1px solid #3d3d54;
            padding-top: 8px;
        }

        .zapper-rules-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            background: transparent;
            border: none;
            color: #a0a0b0;
            font-size: 12px;
            cursor: pointer;
            padding: 4px 0;
        }

        .zapper-rules-toggle:hover {
            color: #eaeaea;
        }

        .zapper-rules-toggle .chevron {
            transition: transform 0.2s ease;
        }

        .zapper-rules-toggle.expanded .chevron {
            transform: rotate(180deg);
        }

        .zapper-rules-list {
            display: none;
            flex-direction: column;
            gap: 4px;
            margin-top: 8px;
            max-height: 120px;
            overflow-y: auto;
        }

        .zapper-rules-list.visible {
            display: flex;
        }

        .zapper-rules-empty {
            font-size: 11px;
            color: #808090;
            text-align: center;
            padding: 8px 0;
        }

        .zapper-rule-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            font-size: 11px;
        }

        .zapper-rule-selector {
            flex: 1;
            color: #c0c0d0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .zapper-rule-delete {
            background: transparent;
            border: none;
            color: #ff6b6b;
            cursor: pointer;
            padding: 2px;
            font-size: 14px;
            line-height: 1;
            opacity: 0.7;
        }

        .zapper-rule-delete:hover {
            opacity: 1;
        }

        .zapper-clear-all {
            margin-top: 8px;
            padding: 6px 10px;
            background: rgba(255, 107, 107, 0.15);
            border: none;
            border-radius: 4px;
            color: #ff6b6b;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            align-self: flex-end;
        }

        .zapper-clear-all:hover {
            background: rgba(255, 107, 107, 0.25);
        }

        .loading {
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 2px solid #3d3d54;
            border-top-color: #4a90d9;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="popup-container">
        <div class="header">
            <img class="header-icon" src="../../assets/images/icon-48.png" alt="WebShield">
            <span class="header-title">WebShield</span>
        </div>

        <div id="loading" class="loading">
            <div class="spinner"></div>
        </div>

        <div id="content" style="display: none;">
            <div class="stats-card">
                <div class="stats-main">
                    <span class="stats-label">Blocked on this page</span>
                    <span id="total-count" class="stats-count">0</span>
                </div>
                <div class="stats-breakdown">
                    <div class="stat-item">
                        <div id="css-count" class="stat-item-count">0</div>
                        <div class="stat-item-label">Cosmetic</div>
                    </div>
                    <div class="stat-item">
                        <div id="extcss-count" class="stat-item-count">0</div>
                        <div class="stat-item-label">Ext CSS</div>
                    </div>
                    <div class="stat-item">
                        <div id="script-count" class="stat-item-count">0</div>
                        <div class="stat-item-label">Scripts</div>
                    </div>
                </div>
            </div>

            <div class="status-bar">
                <div id="status-dot" class="status-dot"></div>
                <span id="status-text" class="status-text">Advanced protection active</span>
            </div>

            <div id="domain" class="domain"></div>

            <div id="trusted-badge" class="trusted-badge hidden">
                <span>✓</span>
                <span>This site is trusted</span>
            </div>

            <div class="whitelist-toggle">
                <label class="whitelist-label" for="whitelist-toggle">
                    <span class="whitelist-icon">🛡️</span>
                    <span class="whitelist-text">Trust this site</span>
                </label>
                <span class="toggle-switch">
                    <input type="checkbox" id="whitelist-toggle" />
                    <span class="toggle-slider"></span>
                </span>
            </div>

            <div class="zapper-card">
                <button id="zapper-button" class="zapper-button">Element Zapper</button>
                <div id="zapper-hint" class="zapper-hint">Click to remove elements on this page</div>

                <div id="zapper-rules-section" class="zapper-rules-section" style="display: none;">
                    <button id="zapper-rules-toggle" class="zapper-rules-toggle">
                        <span>Hidden Elements (<span id="zapper-rules-count">0</span>)</span>
                        <span class="chevron">▼</span>
                    </button>
                    <div id="zapper-rules-list" class="zapper-rules-list">
                        <!-- Rules will be dynamically inserted here -->
                    </div>
                    <button id="zapper-clear-all" class="zapper-clear-all" style="display: none;">Clear All</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="popup.js"></script>
</body>
</html>
